{% extends "base.html" %}
{% block title %}AT调试 - {{ app_name }}{% endblock %}
{% block page_title %}<h5 class="mb-0"><i class="fas fa-terminal"></i> AT指令调试</h5>{% endblock %}
{% block content %}

<div class="row g-3">
    <div class="col-md-4">
        <div class="card p-3 h-100">
            <h6><i class="fas fa-microchip"></i> 目标模块</h6>
            <select class="form-select form-select-sm mb-3" id="atModule">
                <option value="">-- 选择模块 --</option>
                {% for mid, m in modems.items() %}
                {% if m.is_online %}
                <option value="{{ mid }}">{{ m.name }} ({{ m.port }})</option>
                {% endif %}
                {% endfor %}
            </select>

            <h6><i class="fas fa-bolt"></i> 快捷指令</h6>
            <div class="d-flex flex-wrap gap-1 mb-3">
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('ATI')">ATI</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CSQ')">+CSQ</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+COPS?')">+COPS?</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CPIN?')">+CPIN?</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CGSN')">+CGSN</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CGMM')">+CGMM</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CGMR')">+CGMR</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CREG?')">+CREG?</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CGREG?')">+CGREG?</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+QNWINFO')">+QNWINFO</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CMGL=\"ALL\"')">+CMGL</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="quickAT('AT+CMGF=1')">+CMGF=1</button>
            </div>

            <h6><i class="fas fa-keyboard"></i> 自定义指令</h6>
            <div class="input-group input-group-sm mb-2">
                <input type="text" class="form-control" id="atCommand" placeholder="AT+CSQ" onkeydown="if(event.key==='Enter')sendAT()">
                <button class="btn btn-primary" onclick="sendAT()">发送</button>
            </div>
            <div class="d-flex gap-1">
                <button class="btn btn-outline-danger btn-sm flex-grow-1" onclick="clearOutput()"><i class="fas fa-eraser"></i> 清空</button>
                <button class="btn btn-outline-info btn-sm flex-grow-1" onclick="copyOutput()"><i class="fas fa-copy"></i> 复制</button>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card p-3 h-100">
            <h6><i class="fas fa-terminal"></i> 输出</h6>
            <div id="atOutput" style="background:#1e1e1e;color:#d4d4d4;border-radius:8px;padding:15px;font-family:'Consolas','Courier New',monospace;font-size:0.85rem;min-height:400px;max-height:60vh;overflow-y:auto;white-space:pre-wrap;">
                <span style="color:#888;">等待输入AT指令...</span>
            </div>
        </div>
    </div>
</div>

<!-- 历史记录 -->
<div class="card p-3 mt-3">
    <h6><i class="fas fa-history"></i> 最近执行记录</h6>
    <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
            <thead><tr><th>时间</th><th>指令</th><th>结果</th><th>耗时</th></tr></thead>
            <tbody id="atHistoryBody"></tbody>
        </table>
    </div>
</div>

{% endblock %}
{% block extra_scripts %}
<script>
let outputLines = [];

async function sendAT() {
    const moduleId = document.getElementById('atModule').value;
    const command = document.getElementById('atCommand').value.trim();

    if (!moduleId) { showToast('请选择目标模块', 'warning'); return; }
    if (!command) { showToast('请输入AT指令', 'warning'); return; }

    const output = document.getElementById('atOutput');
    output.innerHTML += `<div style="color:#569cd6;">>>> ${command}</div>`;
    document.getElementById('atCommand').value = '';

    const resp = await fetch('/api/at', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({module_id: moduleId, command})
    });
    const data = await resp.json();

    if (data.success) {
        output.innerHTML += `<div style="color:#6a9955;">${escapeHtml(data.response) || '(无响应)'}</div>`;
        output.innerHTML += `<div style="color:#888;">耗时: ${data.duration_ms}ms</div><br>`;
    } else {
        output.innerHTML += `<div style="color:#f44747;">错误: ${data.error || '执行失败'}</div><br>`;
    }
    output.scrollTop = output.scrollHeight;
    loadATHistory();
}

function quickAT(cmd) {
    document.getElementById('atCommand').value = 'AT' + cmd;
    sendAT();
}

function clearOutput() {
    document.getElementById('atOutput').innerHTML = '<span style="color:#888;">输出已清空</span>';
}

function copyOutput() {
    const text = document.getElementById('atOutput').innerText;
    navigator.clipboard.writeText(text).then(() => showToast('已复制', 'success'));
}

function loadATHistory() {
    const moduleId = document.getElementById('atModule').value;
    fetch('/api/at/history?module_id=' + moduleId + '&limit=10')
        .then(r => r.json()).then(data => {
            document.getElementById('atHistoryBody').innerHTML = data.map(h => `
                <tr>
                    <td style="font-size:0.8rem">${formatDate(h.executed_at)}</td>
                    <td><code>${h.command}</code></td>
                    <td>${h.success ? '<span class="badge bg-success">成功</span>' : '<span class="badge bg-danger">失败</span>'}</td>
                    <td>${h.duration_ms}ms</td>
                </tr>`).join('');
        });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadATHistory();
</script>
{% endblock %}
